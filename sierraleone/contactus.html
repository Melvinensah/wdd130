<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles/style.css">
    <title>alafia</title>
</head>
<body>
    <div id="content">
        <header>
            <a class="logo-link" href="index.html">
                <img class="logo" src="images/rsz_coat_of_arms_of_sierra_leonesvg.png" alt="logo image">
            </a>
            
            <nav> 
                <a href="index.html">Home</a>
                <a href="aboutus.html">About Us</a>
                <a href="contactus.html">Contact Us</a>
            </nav>
        </header>
        <main>
            <div id="contact">
                <div id="con-box">
                  <img id="con-img" src="images/rsz_contact_us_image1.jpg" alt="contact image">
                </div>
                <section id="con-msg">
                  <h1 class="con-title">Alafia Tours</h1>
                  <h3>Contact Us @ 2B Checsil Avenue Graaton Freetown Sierra Leone</h3>
                </section>
            </div>
            <div id="feedback"></div>  
            <form action="/my-handling-form-page" method="post">
                <ul>
                <li>
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="user_name" />
                </li>
                <li>
                    <label for="mail">Email:</label>
                    <input type="email" id="mail" name="user_email" />
                </li>
                <li>
                    <label for="msg">Message:</label>
                    <textarea id="msg" name="user_message"></textarea>
                </li>
                <li class="button">
                    <button type="submit">Send your message</button>
                </li>
                </ul>
            </form>   
        </main>

        <footer>
          <p id="info">&copy; 2023 Personal Website  - Melvinensah Bunduka - WDD130-15</p>
          <p><a href="site-plan.html">Site Plan</a></p>
          <div class="social">
            <a class="socialmedia" target="_blank" href="https://facebook.com"><img class="icons" src="https://cdn.glitch.global/1441a017-c76b-4fb2-b4ac-085c1290cf1f/facebook.png?v=1663795619781" alt="fb"></a>
        
            <a class="socialmedia" target="_blank" href="https://twitter.com"><img class="icons" src="https://cdn.glitch.global/1441a017-c76b-4fb2-b4ac-085c1290cf1f/twitter.png?v=1663795620032" alt="twitter"></a>
      
            <a class="socialmedia" target="_blank" href="https://instagram.com"><img class="icons" src="https://cdn.glitch.global/1441a017-c76b-4fb2-b4ac-085c1290cf1f/instagram.png?v=1663795619408" alt="instagram"></a>
          </div>
        </footer>
    </div>
    <script>
        // get the feedback div element so we can do something with it.
        const feedbackElement = document.getElementById('feedback');
        // get the form so we can read what was entered in it.
        const formElement = document.forms[0];
        // add a 'listener' to wait for a submission of our form. When that happens run the code below.
        formElement.addEventListener('submit', function(e) {
            // stop the form from doing the default action.
            e.preventDefault();
            // set the contents of our feedback element to a message letting the user know the form was submitted successfully. Notice that we pull the name that was entered in the form to personalize the message!
            feedbackElement.innerHTML = 'Hello '+ formElement.user_name.value +'! Thank you for your message. We will get back with you as soon as possible!';
            // make the feedback element visible.
            feedbackElement.style.display = "block";
            // add a class to move everything down so our message doesn't cover it.
            document.body.classList.toggle('moveDown');
        });
    </script>
</body>
</html>
